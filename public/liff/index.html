<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Sans+JP:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>
    <title>Astral Compass - 星の羅針盤</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @font-face {
            font-family: 'FLOPDesignFont';
            src: url('https://spicastar.info/fonts/FlopDesignFONT.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'HonokaShinMincho';
            src: url('https://spicastar.info/fonts/HonokaShinMincho.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body,
        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        div,
        p,
        ul,
        li,
        input,
        button,
        select,
        option {
            font-family: "HonokaShinMincho", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif !important;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }


        body {
            background: #FFF;
            color: #666;
            min-height: 100vh;
        }

        /* コンテナ */
        .container {
            max-width: 420px;
            margin: auto;
            background: #013;
            backdrop-filter: blur(14px);
            border: 1px solid #e5e5e5;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            height: 100vh;
            border-radius: 22px;
            overflow: hidden;
        }

        /* チャット */
        .chat-box {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* メッセージ */
        .msg {
            position: relative;
            padding: 18px 20px;
            border-radius: 18px;
            max-width: 85%;
            line-height: 1.7;
            font-size: 14px;
            border: 1px solid #ddd;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        }

        /* 占いメッセージ */
        .msg.bot {
            background: rgba(227, 234, 241, 0.9);
            color: #666;
            border-radius: 20px;
            border: 1px solid #8f8f8f;
            box-shadow:
                0 0 16px 4px rgba(80, 150, 255, 0.55),
                0 0 4px 0 rgba(80, 150, 255, 0.9);
        }

        /* ユーザー */
        .msg.user {
            background: rgba(215, 224, 219, 0.9);
            color: #666;
            border-radius: 20px;
            align-self: flex-end;
            border: 2px solid #63946e;
            box-shadow:
                0 0 16px 4px rgba(120, 220, 170, 0.55),
                0 0 4px 0 rgba(120, 220, 170, 0.95);
        }

        /* 入力エリア */
        .input-area {
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 入力 */
        .input-field {
            margin-bottom: 12px;
        }

        .input-field label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 4px;
            display: block;
        }

        .input-field input,
        .input-field textarea,
        .input-field select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            background: #fff;
            border: 1px solid #ddd;
            color: #555;
        }

        textarea {
            resize: vertical;
        }

        /* メインボタン */
        .btn {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            background: #ffffff;
            color: #555;
            font-weight: 600;
            letter-spacing: 0.03em;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.06);
            margin-bottom: 10px;
            transition: all .15s ease;
        }

        /* hover */
        .btn:hover {
            background: #666;
            color: #ccc;
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
        }

        /* サブボタン */
        .btn-secondary {
            background: #ffffff;
            color: #666;
        }

        /* 選択チップ */
        .btn-toggle {
            padding: 8px 14px;
            border-radius: 16px;
            background: #ffffff;
            color: #555;
            font-size: 13px;
            cursor: pointer;
            transition: all .15s ease;
            margin: 4px;
        }

        /* hover */
        .btn-toggle:hover {
            background: #ececec;
        }

        /* 選択状態 */
        .btn-toggle.active {
            background: #63946e;
            border-color: #63946e;
            color: #fff;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.08);
        }

        /* 結果カード */
        .result-section {
            background:
                radial-gradient(circle at 20% 30%, rgba(120, 120, 255, 0.15) 1px, transparent 1px),
                radial-gradient(circle at 70% 60%, rgba(120, 120, 255, 0.12) 1px, transparent 1px),
                white;
            background-size: 200px 200px;
            border-radius: 20px;
            box-shadow: 0 6px 22px rgba(0, 0, 0, 0.2);
        }

        /* タイトル */
        .result-section h3 {
            letter-spacing: 0.08em;
            color: #bfaaff;
            margin-bottom: 10px;
        }

        .result-section p {
            font-size: 14px;
            line-height: 1.8;
            color: #ddd;
        }

        /* ローディング */
        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #9f7bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        .flatpickr-calendar {
            background: #ffffff;
            border-radius: 16px;
            border: none;
            border: 1px solid #ddd;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
            color: #666;
        }

        .flatpickr-day.selected {
            background: #3b6892;
            color: white;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
    </style>
</head>

<body>
    <div class="container">
        <canvas id="starfield"></canvas>
        <div class="chat-box" id="chatBox"></div>
        <div class="input-area" id="inputArea"></div>
    </div>
    <script>
        const API_BASE = '/api';
        let userState = 'mode_select';
        let formData = {};
        let divinationResult = null;
        let selectedMode = null;
        let messageQueue = Promise.resolve();
        function getGreetingMessage() {
            const hour = new Date().getHours();
            if (hour >= 5 && hour < 11) {
                return "おはようございます。Astral Compass - 星の羅針盤です。あなたの悩みや不安、そして叶えたい夢を聞かせてください。ぴったりの石の魔法で、今日一日が軽やかになるように導きます。まず、あなたについて少し教えてくださいね。";
            } else if (hour >= 11 && hour < 17) {
                return "こんにちは。Astral Compass - 星の羅針盤です。ふと立ち止まりたくなる時や、これから踏み出したい一歩がある時に、この場所があなたのコンパスになります。あなたの悩みや不安、夢を聞いて、ぴったりの石の魔法でそっと背中を押します。いくつか、あなたのことを教えてください。";
            } else if (hour >= 17 && hour < 22) {
                return "こんばんは。Astral Compass - 星の羅針盤です。一日の終わりに、心の中を静かに整えてみませんか。抱えている悩みや不安、そして密かに温めている夢を聞いて、あなたに合う石の魔法で優しく導きます。まずは、あなたについていくつかお伺いします。";
            } else {
                return "遅くまでおつかれさまです。Astral Compass - 星の羅針盤です。夜だからこそ顔を出す想いや不安を、ここでそっと打ち明けてください。あなたの心に寄り添う石の魔法を選んで、静かな夜の中で進む方向を一緒に見つけていきます。いくつか、あなたについて教えてください。";
            }
        }
        function addMsg(text, isUser = false) {
            // キューに処理を積む
            messageQueue = messageQueue.then(() => showMessage(text, isUser));
            return messageQueue;
        }

        // 実際の描画処理
        function showMessage(text, isUser = false) {
            return new Promise((resolve) => {
                const box = document.getElementById('chatBox');
                const div = document.createElement('div');
                div.className = `msg ${isUser ? 'user' : 'bot'}`;
                box.appendChild(div);

                // ユーザーは即表示
                if (isUser) {
                    div.innerHTML = formatText(text);
                    scrollChatToBottom();
                    resolve();
                    return;
                }

                // botはタイプライター
                typeText(div, text, 40).then(() => {
                    scrollChatToBottom();
                    resolve();
                });
            });
        }


        function formatText(text) {
            return text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        }
        function setInputArea(html) {
            document.getElementById('inputArea').innerHTML = html;
            scrollChatToBottom();
        }
        function clearInputArea() {
            setInputArea('');
        }
        async function stepModeSelect() {
            userState = 'mode_select';

            // ここで await すれば「前のメッセージが打ち終わってから」必ず出る
            await addMsg('どちらの方法で石を選びますか？', false);

            setInputArea(`
    <button class="btn" onclick="selectMode('divination')">✨ 石の魔法の導きを得る（占い）</button>
    <button class="btn btn-secondary" onclick="selectMode('stone_select')">💎 好みの石から魔法を得る</button>
  `);
        }
        function selectMode(mode) {
            selectedMode = mode;
            if (mode === 'divination') {
                addMsg('石の魔法の導きを得る', true);
                stepDivinationIntro();
            } else {
                addMsg('好みの石から魔法を得る', true);
                stepStoneSelectMethod();
            }
        }
        function stepDivinationIntro() {
            const text = [
                'あなたについて、悩みや夢を教えてください。',
                'その情報から、あなたにぴったりの石の魔法を導き出します。'
            ].join('\n\n');   // 1つのメッセージに結合

            addMsg(text, false);
            showAstrologicalInfoForm();
        }

        function stepAstrologicalInfo() {
            addMsg('進める', true);
            const hasSavedInfo = formData.gender && formData.birth && formData.birth.date;
            if (hasSavedInfo) {
                askAstrologicalInfoConfirm();
            } else {
                showAstrologicalInfoForm();
            }
        }
        function askAstrologicalInfoConfirm() {
            const birth = formData.birth || {};
            const summary = [
                `性別：${formData.gender || '未設定'}`,
                `生年月日：${birth.date || '未設定'}`,
                `出生時間：${birth.time || '未設定'}`,
                `出生地：${birth.place || '未設定'}`
            ].join('\n');

            const text = [
                '占いに使うあなたのプロフィールです。',
                '',
                summary,
                '',
                'この情報を使いますか？ それとも修正しますか？'
            ].join('\n');

            addMsg(text, false);

            setInputArea(`
        <button class="btn" onclick="continueWithSavedInfo()">この情報を使う</button>
        <button class="btn btn-secondary" onclick="modifyAstrologicalInfo()">修正する</button>
    `);
        }


        function continueWithSavedInfo() {
            addMsg('わかりました。この情報で進めます。', true);
            stepConcerns();
        }
        function modifyAstrologicalInfo() {
            addMsg('修正します', true);
            showAstrologicalInfoForm();
        }
        function showAstrologicalInfoForm() {
            addMsg('占いに必要な情報をお聞きします。', false);
            const gender = formData.gender || '';
            const birth = formData.birth || {};
            const savedDate = birth.date || '';
            const savedTime = birth.time || '';
            const savedPlace = birth.place || '';
            userState = 'astrological_info';
            setInputArea(`
                <div class="input-field">
                    <label>性別 *</label>
                    <div class="btn-group">
                        <button class="btn-toggle ${gender === '女性' ? 'active' : ''}" onclick="selectGender('女性', this)">女性</button>
                        <button class="btn-toggle ${gender === '男性' ? 'active' : ''}" onclick="selectGender('男性', this)">男性</button>
                        <button class="btn-toggle ${gender === 'その他' ? 'active' : ''}" onclick="selectGender('その他', this)">その他</button>
                    </div>
                </div>
                <div class="input-field">
                    <label>生年月日 *</label>
                    <input type="text" id="birthDate" value="${savedDate}" required>
                </div>
                <div class="input-field">
                    <label>出生時間</label>
                    <input type="text" id="birthTime" value="${savedTime}">
                </div>
                <div class="input-field">
                    <label>出生地</label>
                    <input type="text" id="birthPlace" placeholder="例：札幌市" value="${savedPlace}">
                </div>
                <button class="btn" onclick="nextStep()">次へ</button>
            `);
            flatpickr("#birthDate", {
                locale: "ja",
                dateFormat: "Y-m-d",
                maxDate: "today"
            });
            flatpickr("#birthTime", {
                enableTime: true,
                noCalendar: true,
                dateFormat: "H:i",
                time_24hr: true
            });
        }
        function selectGender(gender, el) {
            formData.gender = gender;
            document.querySelectorAll('.input-field:first-child .btn-toggle').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }
        function stepStoneSelectMethod() {
            addMsg('どの方法で石を選びますか？', false);
            setInputArea(`
                <div class="btn-group">
                    <button class="btn-toggle active" onclick="selectStoneMethod('color', this)">色</button>
                    <button class="btn-toggle" onclick="selectStoneMethod('effect', this)">効果</button>
                    <button class="btn-toggle" onclick="selectStoneMethod('zodiac', this)">星座</button>
                    <button class="btn-toggle" onclick="selectStoneMethod('moon', this)">月</button>
                </div>
                <button class="btn" onclick="showStoneOptions()">次へ</button>
            `);
        }
        function selectStoneMethod(method, el) {
            formData.stone_method = method;
            el.parentElement.querySelectorAll('.btn-toggle').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }
        function showStoneOptions() {
            const method = formData.stone_method || 'color';
            addMsg(method, true);
            let options = [];
            if (method === 'color') {
                options = ['紫', 'ピンク', '黄', '透明', '黒', '水色', '紺', '茶金', '白', '赤'];
            } else if (method === 'effect') {
                options = ['愛情', '癒し', '金運', '浄化', '保護', '直感', '情熱', '女性性'];
            } else if (method === 'zodiac') {
                options = ['牡羊座', '牡牛座', '双子座', '蟹座', '獅子座', '乙女座', '天秤座', '蠍座', '射手座', '山羊座', '水瓶座', '魚座'];
            } else {
                options = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
            }
            addMsg(`${method}を選んでください`, false);
            let html = '<div class="btn-group">';
            options.forEach(opt => {
                html += `<button class="btn-toggle" onclick="selectStoneOption('${opt}', this)">${opt}</button>`;
            });
            html += '</div><button class="btn" onclick="confirmStoneSelection()">この石で進む</button>';
            setInputArea(html);
        }
        function selectStoneOption(option, el) {
            formData.stone_option = option;
            el.parentElement.querySelectorAll('.btn-toggle').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }
        function confirmStoneSelection() {
            const option = formData.stone_option;
            if (!option) {
                addMsg('選択してください', false);
                return;
            }
            addMsg(option, true);
            const stoneMap = {
                '紫': 'アメジスト', 'ピンク': 'ローズクォーツ', '黄': 'シトリン', '透明': '水晶',
                '黒': 'オニキス', '水色': 'アクアマリン', '紺': 'ラピスラズリ', '茶金': 'タイガーアイ',
                '白': 'ムーンストーン', '赤': 'カーネリアン'
            };
            const selectedStone = stoneMap[option] || 'アメジスト';
            divinationResult = {
                stones_for_user: [
                    { name: selectedStone, reason: `${option}を選んだあなたにぴったりの石です` }
                ]
            };
            stepOrderChoice();
        }
        function stepConcerns() {
            const text = [
                '今のあなたが特に気になっているテーマを教えてください。',
                '複数選んでも大丈夫です。'
            ].join('\n\n');

            addMsg(text, false);

            userState = 'concerns';
            setInputArea(`
        <div class="btn-group">
            <button class="btn-toggle" onclick="toggleConcern(this, '恋愛')">💕 恋愛</button>
            <button class="btn-toggle" onclick="toggleConcern(this, '仕事')">💼 仕事</button>
            <button class="btn-toggle" onclick="toggleConcern(this, '金運')">💰 金運</button>
            <button class="btn-toggle" onclick="toggleConcern(this, '健康')">🌿 健康</button>
            <button class="btn-toggle" onclick="toggleConcern(this, '人間関係')">🤝 人間関係</button>
            <button class="btn-toggle" onclick="toggleConcern(this, 'その他')">✨ その他</button>
        </div>
        <button class="btn" onclick="nextStep()">次へ</button>
    `);
        }
        function toggleConcern(el, concern) {
            formData.concerns = formData.concerns || [];
            if (el.classList.contains('active')) {
                el.classList.remove('active');
                formData.concerns = formData.concerns.filter(c => c !== concern);
            } else {
                el.classList.add('active');
                if (!formData.concerns.includes(concern)) {
                    formData.concerns.push(concern);
                }
            }
        }
        function stepProblem() {
            if (!formData.concerns || formData.concerns.length === 0) {
                addMsg('少なくとも1つ選んでください。', false);
                return;
            }

            addMsg(formData.concerns.join('、'), true);

            const text = [
                '具体的にどんなことでお悩みですか？',
                'できる範囲で大丈夫なので、今の状況や気持ちを書いてみてください。'
            ].join('\n\n');

            addMsg(text, false);

            userState = 'problem';
            setInputArea(`
        <div class="input-field">
            <textarea id="problemText" placeholder="例：最近彼との関係がうまくいかなくて..."></textarea>
        </div>
        <button class="btn" onclick="executeDiagnose()">占い開始</button>
    `);
        }

        async function executeDiagnose() {
            const problem = document.getElementById('problemText')?.value || '';
            formData.problem = problem;
            if (!problem.trim()) {
                addMsg('悩みを少し教えてください。', false);
                return;
            }
            const date = formData.birth?.date;
            if (!date) {
                addMsg('生年月日は必須です', false);
                return;
            }
            console.log('Executing diagnose with formData:', formData);
            setInputArea(`
                <div class="loading">
                    <div class="spinner"></div>
                    <p>星の配置を読み解いています... 🌌</p>
                </div>
            `);
            try {
                const res = await fetch(`/api/diagnose`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                const json = await res.json();
                if (json.error) {
                    addMsg(`エラーが発生しました: ${json.error}`, false);
                    clearInputArea();
                    return;
                }
                divinationResult = json;
                window.diagnosisId = json.diagnosis_id;
                displayDivinationResult(json);
            } catch (err) {
                addMsg('通信エラーが発生しました', false);
                clearInputArea();
            }
        }
        function displayDivinationResult(result) {
            clearInputArea();
            const stoneName = result.stone_name ||
                (result.stones_for_user?.[0]?.name || "あなたの石");
            const section = document.createElement('div');
            section.className = 'result-section';
            section.innerHTML = `
            <h3>あなたの羅針盤</h3>
            <p>
            今のあなたに必要なのは――<br><br>
            <strong style="font-size:18px;">${stoneName}</strong>
            </p>
            <p style="margin-top:10px;">
            あなたはもう、答えを知っています。
            </p>
            `;
            document.getElementById('chatBox').appendChild(section);
            setInputArea(`
                <button class="btn" onclick="stepOrderChoice()">💎 ブレスレットを作る</button>
                <button class="btn btn-secondary" onclick="restartFromBeginning()">🔄 もう一度占う</button>
            `);
        }
        function stepOrderChoice() {
            addMsg('この石をどのように手に入れますか？', false);
            setInputArea(`
                <button class="btn" onclick="selectOrderType('custom')">🎨 オーダーメイド（カスタマイズ）</button>
                <button class="btn btn-secondary" onclick="selectOrderType('shop')">🛍️ ネットショップから選ぶ</button>
            `);
        }
        function selectOrderType(type) {
            if (type === 'custom') {
                addMsg('オーダーメイド（カスタマイズ）', true);
                stepBraceletSize();
            } else {
                addMsg('ネットショップから選ぶ', true);
                addMsg('ネットショップへのリンクを準備中です。しばらくお待ちください。', false);
                clearInputArea();
                setInputArea(`
                    <button class="btn btn-secondary" onclick="restartFromBeginning()">🔄 最初に戻る</button>
                `);
            }
        }
        function stepBraceletSize() {
            addMsg('ブレスレットのサイズとデザインを選んでください。', false);
            const savedWrist = formData.wrist_inner_cm || 15.0;
            const savedBead = formData.bead_size_mm || 8;
            setInputArea(`
                <div class="input-field">
                    <label>手首の内径（cm）</label>
                    <input type="number" id="wristInner" step="0.5" value="${savedWrist}" min="10" max="25">
                    <small style="color:#999;">手首の最も細い部分を測ってください</small>
                </div>
                <div class="input-field">
                    <label>石の大きさ（mm）</label>
                    <select id="beadSize">
                        <option value="6" ${savedBead == 6 ? 'selected' : ''}>6mm（細めで華奢）</option>
                        <option value="8" ${savedBead == 8 ? 'selected' : ''}>8mm（標準）</option>
                        <option value="10" ${savedBead == 10 ? 'selected' : ''}>10mm（太めで存在感）</option>
                        <option value="12" ${savedBead == 12 ? 'selected' : ''}>12mm（ボリューム重視）</option>
                    </select>
                </div>
                <div class="input-field">
                    <label>ブレスレットのタイプ</label>
                    <div class="btn-group">
                        <button class="btn-toggle active" onclick="selectDesign('おまかせ', this)">おまかせ</button>
                        <button class="btn-toggle" onclick="selectDesign('単色（シンプル）', this)">一色</button>
                        <button class="btn-toggle" onclick="selectDesign('２色（混合）', this)">二色</button>
                        <button class="btn-toggle" onclick="selectDesign('トップを入れる', this)">トップ</button>
                    </div>
                </div>
                <button class="btn" onclick="buildBracelet()">✨ あなたを導くブレスレットを完成させる</button>
            `);
        }
        function selectDesign(style, el) {
            formData.design_style = style;
            document.querySelectorAll('.input-field:last-child .btn-group .btn-toggle').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }
        async function buildBracelet() {
            const wrist = parseFloat(document.getElementById('wristInner')?.value || 15.0);
            const beadSize = parseInt(document.getElementById('beadSize')?.value || 8);
            const designStyle = formData.design_style || 'おまかせ';
            formData.wrist_inner_cm = wrist;
            formData.bead_size_mm = beadSize;
            addMsg(`手首内径: ${wrist}cm / 石サイズ: ${beadSize}mm / タイプ: ${designStyle}`, true);
            setInputArea(`
                <div class="loading">
                    <div class="spinner"></div>
                    <p>ブレスレットをデザインしています... 💎</p>
                </div>
            `);
            try {
                const res = await fetch(`/api/build-bracelet`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        diagnosis_id: window.diagnosisId,
                        stones_for_user: divinationResult.stones_for_user || [
                            {
                                name: divinationResult.stone_name,
                                reason: "診断結果で選ばれた石"
                            }
                        ],
                        wrist_inner_cm: wrist,
                        bead_size_mm: beadSize,
                        design_style: designStyle
                    })
                });
                const json = await res.json();
                if (json.error) {
                    addMsg(`エラーが発生しました: ${json.error}`, false);
                    clearInputArea();
                    return;
                }
                displayBraceletResult(json);
            } catch (err) {
                addMsg('通信エラーが発生しました', false);
                clearInputArea();
            }
        }
        function displayBraceletResult(data) {
            clearInputArea();
            const section = document.createElement('div');
            section.className = 'result-section';
            let html = `<h3>💎 あなたを導くブレスレットはこれです</h3>`;
            html += `<p>${formatText(data.design_text || 'デザイン情報がありません')}</p>`;
            section.innerHTML = html;
            document.getElementById('chatBox').appendChild(section);
            if (data.order_summary) {
                const orderSection = document.createElement('div');
                orderSection.className = 'result-section';
                orderSection.innerHTML = `<h3>📋 あなたを導く石たち</h3><p style="font-size:13px;">${data.order_summary.replace(/\n/g, '<br>')}</p>`;
                document.getElementById('chatBox').appendChild(orderSection);
            }
            document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
            const savedProfile = {
                gender: formData.gender,
                birth: formData.birth,
                wrist_inner_cm: formData.wrist_inner_cm,
                bead_size_mm: formData.bead_size_mm
            };
            console.log('Saving profile:', savedProfile);
            localStorage.setItem('hoshin-profile', JSON.stringify(savedProfile));
            setInputArea(`
                <button class="btn" onclick="confirmOrder()">📱 LINEでオーダーする</button>
                <button class="btn btn-secondary" onclick="restartFromBeginning()">🔄 もう一度占う</button>
            `);
        }
        function confirmOrder() {
            window.location.href = "https://line.me/R/ti/p/あなたのID";
        }
        function restartFromBeginning() {
            document.getElementById('chatBox').innerHTML = '';
            const greeting = getGreetingMessage();
            document.getElementById('chatBox').innerHTML = `<div class="msg bot">${greeting}</div>`;
            const saved = localStorage.getItem('hoshin-profile');
            console.log('Loaded from storage:', saved);
            if (saved) {
                formData = JSON.parse(saved);
                console.log('Parsed formData:', formData);
                askReuseProfile();
            } else {
                stepModeSelect();
            }
        }
        function askReuseProfile() {
            const birth = formData.birth || {};
            const summary = [
                `性別：${formData.gender || '未設定'}`,
                `生年月日：${birth.date || '未設定'}`,
                `出生地：${birth.place || '未設定'}`,
                `手首内径：${formData.wrist_inner_cm || 15.0}cm`,
                `石サイズ：${formData.bead_size_mm || 8}mm`
            ].join('\n');
            addMsg('前回のプロフィール情報を見つけました。', false);
            addMsg(summary, false);
            setInputArea(`
                <button class="btn" onclick="reuseProfile()">この情報を使う</button>
                <button class="btn btn-secondary" onclick="resetProfile()">修正してから占う</button>
            `);
        }
        function reuseProfile() {
            console.log('Reusing profile with formData:', formData);
            stepModeSelect();
        }
        function resetProfile() {
            formData = {};
            document.getElementById('chatBox').innerHTML = `<div class="msg bot">${getGreetingMessage()}</div>`;
            stepModeSelect();
        }
        function nextStep() {
            if (userState === 'astrological_info') {
                const date = document.getElementById('birthDate')?.value;
                const time = document.getElementById('birthTime')?.value || '';
                const place = document.getElementById('birthPlace')?.value || '';
                if (!formData.gender) {
                    addMsg('性別を選んでください', false);
                    return;
                }
                if (!date) {
                    addMsg('生年月日は必須です', false);
                    return;
                }
                formData.birth = { date, time, place };
                console.log('Saved astrological info:', formData.birth);
                stepConcerns();
            } else if (userState === 'concerns') stepProblem();
        }
        function scrollChatToBottom() {
            const box = document.getElementById('chatBox');
            if (!box) return;
            box.scrollTop = box.scrollHeight;
        }
        function typeText(element, text, speed = 40) {
            return new Promise((resolve) => {
                let i = 0;
                element.textContent = '';

                function type() {
                    if (i < text.length) {
                        element.textContent += text[i];
                        i++;
                        scrollChatToBottom();
                        setTimeout(type, speed);
                    } else {
                        resolve();
                    }
                }
                type();
            });
        }


        window.onload = async function () {
            const saved = localStorage.getItem('hoshin-profile');
            const box = document.getElementById('chatBox');

            box.innerHTML = '';
            await addMsg(getGreetingMessage(), false);  // 挨拶を打ち終わるまで待つ

            if (saved) {
                formData = JSON.parse(saved);
                console.log('Initial load - formData:', formData);
                askReuseProfile();   // ここも必要なら async/await 化できる
            } else {
                stepModeSelect();    // ここで上の async stepModeSelect が走る
            }
        };



    </script>
    <script>
        const canvas = document.getElementById("starfield");
        const ctx = canvas.getContext("2d");
        let stars = [];
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resize);
        resize();
        function createStars() {
            stars = [];
            for (let i = 0; i < 120; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.5,
                    speed: Math.random() * 0.3 + 0.1
                });
            }
        }
        createStars();
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
                ctx.fill();
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
