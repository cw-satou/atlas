<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Sans+JP:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>
    <title>星の羅針盤「あとらす」</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @font-face {
            font-family: 'HonokaShinMincho';
            src: url('https://astral-gamma.vercel.app/res/fonts/HonokaShinMincho.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body,
        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        div,
        p,
        ul,
        li,
        input,
        button,
        select,
        option {
            font-family: "HonokaShinMincho", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif !important;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }


        body {
            background: #FFF;
            color: #333;
            min-height: 100vh;
        }

        /* コンテナ */
        .container {
            max-width: 420px;
            margin: auto;
            background: #013;
            backdrop-filter: blur(14px);
            border: 1px solid #e5e5e5;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            height: 100vh;
            border-radius: 22px;
            overflow: hidden;
        }

        /* チャット */
        .chat-box {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* メッセージ */
        .msg {
            position: relative;
            padding: 18px 20px;
            border-radius: 18px;
            max-width: 85%;
            line-height: 1.7;
            font-size: 14px;
            border: 1px solid transparent;
            box-shadow: none;
        }

        /* 診断メッセージ */
        .msg.bot {
            background: white;
            color: #333;
            border-radius: 20px;
            border: 1px solid #8f8f8f;
            box-shadow:
                0 0 18px 4px rgba(80, 150, 255, 0.55),
                0 0 4px 0 rgba(80, 150, 255, 0.9);
            line-height: 1.5;
        }

        /* ユーザー */
        .msg.user {
            background: white;
            color: #333;
            border-radius: 20px;
            align-self: flex-end;
            border: 2px solid #63946e;
            box-shadow:
                0 0 18px 4px rgba(120, 220, 170, 0.55),
                0 0 4px 0 rgba(120, 220, 170, 0.95);
        }

        .result-section p strong,
        .msg.bot strong,
        .msg.user strong {
            font-weight: 700;
            color: #333;
        }

        .loading p {
            color: #333;
        }

        /* 入力エリア */
        .input-area {
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            background: #fff;
            color: #333;
        }

        /* 入力 */
        .input-field {
            margin-bottom: 12px;
        }

        .input-field label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 4px;
            display: block;
        }

        .input-field input,
        .input-field textarea,
        .input-field select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            background: #fff;
            border: 1px solid #ddd;
            color: #333;
        }

        textarea {
            resize: vertical;
        }

        /* メインボタン */
        .btn {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            background: #ffffff;
            color: #333;
            font-weight: 600;
            letter-spacing: 0.03em;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.06);
            margin-bottom: 10px;
            transition: all .15s ease;
        }

        /* hover */
        .btn:hover {
            background: #666;
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
        }

        /* サブボタン */
        .btn-secondary {
            background: #fff;
            color: #333;
        }

        /* 選択チップ */
        .btn-toggle {
            padding: 8px 14px;
            border-radius: 16px;
            background: #fff;
            color: #333;
            font-size: 13px;
            cursor: pointer;
            transition: all .15s ease;
            margin: 4px;
        }

        /* hover */
        .btn-toggle:hover {
            background: #ececec;
        }

        /* 選択状態 */
        .btn-toggle.active {
            background: #63946e;
            border-color: #63946e;
            color: #fff;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.08);
        }

        /* 結果カード */
        .result-section {
            background:
                radial-gradient(circle at 20% 30%, rgba(120, 120, 255, 0.08) 1px, transparent 1px),
                radial-gradient(circle at 70% 60%, rgba(120, 120, 255, 0.06) 1px, transparent 1px),
                rgba(227, 234, 241, 0.9);
            /* .msg.bot とトーンを揃える */
            background-size: 200px 200px;
            border-radius: 16px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.18);
            /* 影を少し弱める */
            padding: 14px 16px;
        }

        .result-section h3 {
            letter-spacing: 0.08em;
            color: #333;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .result-section p {
            font-size: 14px;
            line-height: 1.8;
            color: #333;
        }

        /* ローディング */
        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #9f7bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        .flatpickr-calendar {
            background: #ffffff;
            border-radius: 16px;
            border: none;
            border: 1px solid #ddd;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
            color: #333;
        }

        .flatpickr-day.selected {
            background: #3b6892;
            color: white;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
    </style>
</head>

<body>
    <div class="container">
        <canvas id="starfield"></canvas>
        <div class="chat-box" id="chatBox"></div>
        <div class="input-area" id="inputArea"></div>
    </div>
    <script>
        const API_BASE = '/api';
        let userState = 'mode_select';
        let formData = {};
        let divinationResult = null;
        let selectedMode = null;
        let messageQueue = Promise.resolve();
        function getGreetingMessage() {
            const hour = new Date().getHours();
            const nameForDisplay = getUserNameForDisplay();

            if (hour >= 5 && hour < 11) {
                return `おはようございます。星の羅針盤「あとらす」です。\n\n今の気分や、ちょっと気になっていることがあれば、ここで整理してみませんか？\nあなたのお話と星の流れをもとに、今のあなたに合いそうな石や過ごし方のヒントをお伝えします。`;
            } else if (hour >= 11 && hour < 17) {
                return `こんにちは。星の羅針盤「あとらす」です。\n\n仕事や人間関係、これからのことなど、頭の中が少しごちゃごちゃしているときは、一度言葉にしてみるのがおすすめです。\nいま気になっていることを教えていただければ、星の配置とあわせて、落ち着いて考えるためのヒントをお出しします。`;
            } else {
                return `こんばんは。星の羅針盤「あとらす」です。\n\n一日の終わりに、心の中を少しだけ振り返ってみませんか。\nうまく言葉にならなくても大丈夫なので、気になっていることやモヤモヤしていることを、ここにそのまま書いてみてください。`;
            }
        }
        function addMsg(text, isUser = false) {
            // キューに処理を積む
            messageQueue = messageQueue.then(() => showMessage(text, isUser));
            return messageQueue;
        }

        // 実際の描画処理
        function showMessage(text, isUser = false) {
            return new Promise((resolve) => {
                const box = document.getElementById('chatBox');
                const div = document.createElement('div');
                div.className = `msg ${isUser ? 'user' : 'bot'}`;
                box.appendChild(div);

                const formatted = formatText(
                    text.replace(/\n+/g, '<br>').replace(/(<br>)+/g, '<br><br>')
                );

                if (isUser) {
                    div.innerHTML = formatted;
                    scrollChatToBottom();
                    resolve();
                    return;
                }

                typeText(div, formatted, 40).then(() => {
                    scrollChatToBottom();
                    resolve();
                });
            });
        }



        function formatText(text) {
            if (!text) return '';

            // 1段階だけ HTML エスケープを戻す
            const decoded = text
                .replace(/&lt;/g, '<')
                .replace(/&gt;/g, '>')
                .replace(/&amp;/g, '&');

            // もしまだ ** ... ** が使われているケースも残したいなら、ここで変換
            return decoded.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        }
        function setInputArea(html) {
            document.getElementById('inputArea').innerHTML = html;
            scrollChatToBottom();
        }
        function clearInputArea() {
            setInputArea('');
        }
        function stepModeSelect() {
            userState = 'mode_select';

            addMsg('今日はどちらにしますか？', false);

            setInputArea(`
    <button class="btn" onclick="selectMode('today_fortune')">
      🔮 今日の運勢を診断する
    </button>
    <button class="btn" onclick="selectMode('divination')">
      ✨ 石の魔法の導きを得る
    </button>
    <button class="btn btn-secondary" onclick="selectMode('stone_select')">
      💎 好みの石から魔法を得る
    </button>
  `);
        }

        function selectMode(mode) {
            selectedMode = mode;

            if (mode === 'today_fortune') {
                addMsg('今日の運勢を診断する', true);
                stepTodayFortune();          // 今日の運勢 → テーマへ流す関数
            } else if (mode === 'divination') {
                addMsg('石の魔法の導きを得る', true);
                stepDivinationIntro();       // 既存
            } else {
                addMsg('好みの石から魔法を得る', true);
                stepStoneSelectMethod();     // 既存
            }
        }

        async function stepTodayFortune() {
            const birth = formData.birth || {};
            selectedMode = 'today_fortune';
            await addMsg(
                '今日の運勢を読むために、生年月日・生まれた時間と場所を教えていただけますか？',
                false
            );
            showAstrologicalInfoForm();
        }


        function submitTodayComment() {
            const textarea = document.getElementById('todayComment');
            const comment = (textarea && textarea.value.trim()) || '';

            if (comment) {
                // ユーザー発話として表示
                addMsg(comment, true);
                // プロフィールに保存しておく（問題文などと合わせて後でAPIに渡せる）
                formData.today_comment = comment;
            }

            clearInputArea();

            // いつものテーマ選択へ
            addMsg(
                'ありがとうございます。\nでは、この流れを踏まえて、今日はどんなテーマについて詳しく見ていきましょうか？',
                false
            );
            stepConcerns();
        }


        function stepDivinationIntro() {
            const text = [
                "まずは、今のあなたについて少しだけ教えてください。",
                "はっきりした悩みがなくても大丈夫です。なんとなく気になっていることや、こうなれたらいいなと思うことがあれば、そのままの言葉で書いてください。",
            ].join("\n\n");
            addMsg(text, false);

            showAstrologicalInfoForm();
        }

        function stepAstrologicalInfo() {
            addMsg('進める', true);
            const hasSavedInfo = formData.gender && formData.birth && formData.birth.date;
            if (hasSavedInfo) {
                askAstrologicalInfoConfirm();
            } else {
                showAstrologicalInfoForm();
            }
        }
        function askAstrologicalInfoConfirm() {
            const birth = formData.birth || {};
            const summary = [
                `性別：${formData.gender || '未設定'}`,
                `生年月日：${birth.date || '未設定'}`,
                `出生時間：${birth.time || '未設定'}`,
                `出生地：${birth.place || '未設定'}`
            ].join('\n');

            const text = [
                '診断に使うあなたのプロフィールです。',
                '',
                summary,
                '',
                'この情報を使いますか？ それとも修正しますか？'
            ].join('\n');

            addMsg(text, false);

            setInputArea(`
        <button class="btn" onclick="continueWithSavedInfo()">この情報を使う</button>
        <button class="btn btn-secondary" onclick="modifyAstrologicalInfo()">修正する</button>
    `);
        }


        function continueWithSavedInfo() {
            addMsg('わかりました。この情報で進めます。', true);
            stepConcerns();
        }
        function modifyAstrologicalInfo() {
            addMsg('修正します', true);
            showAstrologicalInfoForm();
        }
        function showAstrologicalInfoForm() {
            addMsg('診断に必要な情報をお聞きします。', false);

            const gender = formData.gender || '';
            const birth = formData.birth || {};
            const savedDate = birth.date || '';
            const savedTime = birth.time || '';
            const savedPlace = birth.place || '';

            // ★ 追加：名前の既存値（なければ空文字）
            const savedName = formData.name || '';

            userState = 'astrological_info';

            setInputArea(`
        <div class="input-field">
            <label>お名前（ニックネーム）</label>
            <input type="text" id="userName" value="${savedName}" placeholder="例：さと">
        </div>
        <div class="input-field">
            <label>性別 *</label>
            <div class="btn-group">
                <button class="btn-toggle ${gender === '女性' ? 'active' : ''}" onclick="selectGender('女性', this)">女性</button>
                <button class="btn-toggle ${gender === '男性' ? 'active' : ''}" onclick="selectGender('男性', this)">男性</button>
                <button class="btn-toggle ${gender === 'その他' ? 'active' : ''}" onclick="selectGender('その他', this)">その他</button>
            </div>
        </div>
        <div class="input-field">
            <label>生年月日 *</label>
            <input type="text" id="birthDate" value="${savedDate}" required>
        </div>
        <div class="input-field">
            <label>出生時間</label>
            <input type="text" id="birthTime" value="${savedTime}">
        </div>
        <div class="input-field">
            <label>出生地</label>
            <input type="text" id="birthPlace" placeholder="例：札幌市" value="${savedPlace}">
        </div>
        <button class="btn" onclick="nextStep()">次へ</button>
    `);

            flatpickr("#birthDate", {
                locale: "ja",
                dateFormat: "Y-m-d",
                maxDate: "today"
            });
            flatpickr("#birthTime", {
                enableTime: true,
                noCalendar: true,
                dateFormat: "H:i",
                time_24hr: true
            });
        }
        function onAstrologicalInfoNext() {
            const date = document.getElementById('birthDate').value;
            const time = document.getElementById('birthTime').value;
            const place = document.getElementById('birthPlace').value;

            if (!date) {
                addMsg('生年月日は必ず入力してください。', false);
                return;
            }

            formData.birth = { date, time, place };

            addMsg('わかりました。この情報で星を見ていきますね。', true);

            // もし「今日の運勢」から来ていたなら、そこに戻す
            if (selectedMode === 'today_ai') {
                stepTodayFortune();
            } else {
                // 通常フローの場合は、元の流れへ
                stepConcerns(); // あるいは stepDivinationIntro() など
            }
        }
        function selectGender(gender, el) {
            formData.gender = gender;
            document.querySelectorAll('.input-field:first-child .btn-toggle').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }
        function stepStoneSelectMethod() {
            addMsg('どの方法で石を選びますか？', false);
            setInputArea(`
                <div class="btn-group">
                    <button class="btn-toggle active" onclick="selectStoneMethod('color', this)">色</button>
                    <button class="btn-toggle" onclick="selectStoneMethod('effect', this)">効果</button>
                    <button class="btn-toggle" onclick="selectStoneMethod('zodiac', this)">星座</button>
                    <button class="btn-toggle" onclick="selectStoneMethod('moon', this)">月</button>
                </div>
                <button class="btn" onclick="showStoneOptions()">次へ</button>
            `);
        }
        function selectStoneMethod(method, el) {
            formData.stone_method = method;
            el.parentElement.querySelectorAll('.btn-toggle').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }
        function showStoneOptions() {
            const method = formData.stone_method || 'color';
            addMsg(method, true);
            let options = [];
            if (method === 'color') {
                options = ['紫', 'ピンク', '黄', '透明', '黒', '水色', '紺', '茶金', '白', '赤'];
            } else if (method === 'effect') {
                options = ['愛情', '癒し', '金運', '浄化', '保護', '直感', '情熱', '女性性'];
            } else if (method === 'zodiac') {
                options = ['牡羊座', '牡牛座', '双子座', '蟹座', '獅子座', '乙女座', '天秤座', '蠍座', '射手座', '山羊座', '水瓶座', '魚座'];
            } else {
                options = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
            }
            addMsg(`${method}を選んでください`, false);
            let html = '<div class="btn-group">';
            options.forEach(opt => {
                html += `<button class="btn-toggle" onclick="selectStoneOption('${opt}', this)">${opt}</button>`;
            });
            html += '</div><button class="btn" onclick="confirmStoneSelection()">この石で進む</button>';
            setInputArea(html);
        }
        function selectStoneOption(option, el) {
            formData.stone_option = option;
            el.parentElement.querySelectorAll('.btn-toggle').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }
        function confirmStoneSelection() {
            const option = formData.stone_option;
            if (!option) {
                addMsg('選択してください', false);
                return;
            }
            addMsg(option, true);
            const stoneMap = {
                '紫': 'アメジスト', 'ピンク': 'ローズクォーツ', '黄': 'シトリン', '透明': '水晶',
                '黒': 'オニキス', '水色': 'アクアマリン', '紺': 'ラピスラズリ', '茶金': 'タイガーアイ',
                '白': 'ムーンストーン', '赤': 'カーネリアン'
            };
            const selectedStone = stoneMap[option] || 'アメジスト';
            divinationResult = {
                stones_for_user: [
                    { name: selectedStone, reason: `${option}を選んだあなたにぴったりの石です` }
                ]
            };
            stepOrderChoice();
        }
        function stepConcerns() {
            const nameForDisplay = getUserNameForDisplay();
            const text = [
                `${nameForDisplay}がいま、特に気になっているテーマを教えてください。`,
                '複数選んでも大丈夫です。'
            ].join('\n\n');

            addMsg(text, false);

            userState = 'concerns';
            setInputArea(`
        <div class="btn-group">
            <button class="btn-toggle" onclick="toggleConcern(this, '恋愛')">💕 恋愛</button>
            <button class="btn-toggle" onclick="toggleConcern(this, '仕事')">💼 仕事</button>
            <button class="btn-toggle" onclick="toggleConcern(this, '金運')">💰 金運</button>
            <button class="btn-toggle" onclick="toggleConcern(this, '健康')">🌿 健康</button>
            <button class="btn-toggle" onclick="toggleConcern(this, '人間関係')">🤝 人間関係</button>
            <button class="btn-toggle" onclick="toggleConcern(this, 'その他')">✨ その他</button>
        </div>
        <button class="btn" onclick="nextStep()">次へ</button>
    `);
        }
        function toggleConcern(el, concern) {
            formData.concerns = formData.concerns || [];
            if (el.classList.contains('active')) {
                el.classList.remove('active');
                formData.concerns = formData.concerns.filter(c => c !== concern);
            } else {
                el.classList.add('active');
                if (!formData.concerns.includes(concern)) {
                    formData.concerns.push(concern);
                }
            }
        }
        function stepProblem() {
            if (!formData.concerns || formData.concerns.length === 0) {
                addMsg('少なくとも1つ選んでください。', false);
                return;
            }

            addMsg(formData.concerns.join('、'), true);

            const text = [
                "具体的な状況やお気持ちを、書ける範囲で大丈夫なので教えてください。",
                "うまくまとまっていなくても大丈夫です。「最近なんとなく気分が落ちやすい」「将来の方向性がぼんやりしている」など、一言でもかまいません。",
            ].join("\n\n");
            addMsg(text, false);


            userState = 'problem';
            setInputArea(`
        <div class="input-field">
            <textarea id="problemText" placeholder="例：最近彼との関係がうまくいかなくて..."></textarea>
        </div>
        <button class="btn" onclick="executeDiagnose()">診断開始</button>
    `);
        }

        async function executeDiagnose() {
            const nameForDisplay = getUserNameForDisplay();
            let problem = document.getElementById('problemText')?.value || '';
            const date = formData.birth?.date;

            if (!problem) {
                problem = `具体的なご相談内容は書かれていないため、今の${nameForDisplay}の全体の流れや、これから大切にしたいテーマがわかるような全体運を中心に読み解いてください。`;
            }

            // ① ユーザーの入力をそのままユーザー吹き出しで表示
            addMsg(problem, true);

            formData.problem = problem;

            if (!date) {
                addMsg('生年月日は必須です', false);
                return;
            }

                await addMsg(
                    'AIにうまくアクセスできませんでした。\n少し時間をおいてからもう一度お試しください。',
                    false
                );
                setInputArea(`
          <button class="btn" onclick="restartFromBeginning()">🔄 最初に戻る</button>
        `);
            }
        }
        function extractFortuneFromMessage(raw) {
            if (!raw) return '';

            // ```json ～ ``` を取り除く
            const cleaned = raw
                .replace(/```json/g, '')
                .replace(/```/g, '')
                .trim();

            try {
                const obj = JSON.parse(cleaned);
                // { "鑑定結果": "..." } 想定
                return obj.鑑定結果 || cleaned;
            } catch (e) {
                // JSONじゃなければそのまま返す
                return cleaned;
            }
        }


        function scrollChatToBottom() {
            const box = document.getElementById('chatBox');
            if (!box) return;
            box.scrollTop = box.scrollHeight;
        }
        function typeText(element, text, speed = 40) {
            return new Promise((resolve) => {
                const html = formatText(text); // **〜** を <strong>〜</strong> に変換
                let i = 0;
                element.innerHTML = '';

                function type() {
                    if (i < html.length) {
                        element.innerHTML = html.slice(0, i + 1);
                        i++;
                        scrollChatToBottom();
                        setTimeout(type, speed);
                    } else {
                        resolve();
                    }
                }
                type();
            });
        }

        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) {
                return parts.pop().split(';').shift();
            }
            return null;
        }

        function setCookie(name, value, days = 365) {
            const d = new Date();
            d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
            const expires = "expires=" + d.toUTCString();
            document.cookie = `${name}=${value};${expires};path=/`;
        }

        function generateUserId() {
            // 簡易 UUID でOK（将来差し替え前提）
            const s4 = () =>
                Math.floor((1 + Math.random()) * 0x10000)
                    .toString(16)
                    .substring(1);
            return (
                s4() +
                s4() +
                "-" +
                s4() +
                "-" +
                s4() +
                "-" +
                s4() +
                "-" +
                s4() +
                s4() +
                s4()
            );
        }

        let userId = null;

        window.onload = async function () {
            // 1) userId を cookie から読み込み or 新規発行
            userId = getCookie('hoshin_user_id');
            if (userId) {
                try {
                    const res = await fetch(`/api/profile?user_id=${encodeURIComponent(userId)}`);
                    if (res.ok) {
                        const profile = await res.json();
                        formData = { ...formData, ...profile };
                    }
                } catch (e) {
                    console.log('profile load error', e);
                }
            }


            const box = document.getElementById('chatBox');
            box.innerHTML = '';
            await addMsg(getGreetingMessage(), false);

            // 2) ここでサーバからプロフィール取得（あとでAPI実装）
            // 例:
            // const res = await fetch(`/api/profile?user_id=${encodeURIComponent(userId)}`);
            // if (res.ok) {
            //   const profile = await res.json();
            //   formData = { ...formData, ...profile };
            // }

            // 3) ローカルのlocalStorageもあればマージ（任意）
            const saved = localStorage.getItem('hoshin-profile');
            if (saved) {
                const localProfile = JSON.parse(saved);
                formData = { ...localProfile, ...formData };
            }

            stepModeSelect();
        };


    </script>
    <script>
        const canvas = document.getElementById("starfield");
        const ctx = canvas.getContext("2d");
        let stars = [];
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resize);
        resize();
        function createStars() {
            stars = [];
            for (let i = 0; i < 120; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.5,
                    speed: Math.random() * 0.3 + 0.1
                });
            }
        }
        createStars();
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
                ctx.fill();
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
