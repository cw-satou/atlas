<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Sans+JP:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>
    <title>星の羅針盤「あとらす」</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @font-face {
            font-family: "LINESeedJP";
            src: url('https://astral-gamma.vercel.app/res/fonts/LINESeedJP.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body,
        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        div,
        p,
        ul,
        li,
        input,
        button,
        select,
        option {
            font-family: "LINESeedJP", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif !important;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            background: #FFF;
            color: #222;
            min-height: 100vh;
        }

        /* コンテナ */
        .container {
            max-width: 480px;
            margin: auto;
            background: #fff;
            backdrop-filter: blur(14px);
            border: 1px solid #e5e5e5;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* チャット */
        .chat-box {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin: 6px;
            z-index: 2;
        }

        /* メッセージ */
        .msg {
            position: relative;
            padding: 18px 20px;
            background: rgba(255, 248, 235, 0.80);
            color: #222;
            backdrop-filter: blur(3px);
            border-radius: 18px;
            max-width: 85%;
            line-height: 1.7;
            font-size: 14px;
            border: 1px solid transparent;
            box-shadow: none;
        }

        /* 診断メッセージ */
        .msg.bot {
            border-radius: 20px;
            border: 1px solid #8f8f8f;
            box-shadow:
                0 0 18px rgba(210, 180, 140, 0.75),
                0 0 6px rgba(210, 180, 140, 0.9),
                0 0 2px rgba(255, 245, 220, 0.9);
            line-height: 1.5;
        }

        /* ユーザー */
        .msg.user {
            border-radius: 20px;
            align-self: flex-end;
            border: 1px solid #8f8f8f;
            box-shadow:
                0 0 12px rgba(196, 216, 196, 0.45),
                0 0 4px rgba(208, 233, 196, 0.6);
        }

        .result-section p strong,
        .msg.bot strong,
        .msg.user strong {
            font-weight: 700;
            color: #222;
        }

        .loading p {
            color: #222;
        }

        /* 入力エリア */
        .input-area {
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 248, 235, 0.80);
            color: #222;
            z-index: 3;
        }

        /* 入力 */
        .input-field {
            margin-bottom: 12px;
        }

        .input-field label {
            font-size: 12px;
            color: #222;
            margin-bottom: 4px;
            display: block;
        }

        .input-field input,
        .input-field textarea,
        .input-field select {
            width: 100%;
            padding: 10px;
            border-radius: 4px;
            background: #fff;
            border: 1px solid #ddd;
            color: #222;
        }

        textarea {
            resize: vertical;
        }

        /* メインボタン */
        .btn {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            background: #ffffff;
            color: #222;
            font-weight: 600;
            letter-spacing: 0.03em;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.06);
            margin-bottom: 10px;
            transition: all .15s ease;
        }

        /* hover */
        .btn:hover {
            background: #666;
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
        }

        /* サブボタン */
        .btn-secondary {
            background: #fff;
            color: #222;
        }

        /* 選択チップ */
        .btn-toggle {
            padding: 8px 14px;
            border-radius: 16px;
            background: #fff;
            color: #222;
            font-size: 13px;
            cursor: pointer;
            transition: all .15s ease;
            margin: 4px;
        }

        /* hover */
        .btn-toggle:hover {
            background: #ececec;
        }

        /* 選択状態 */
        .btn-toggle.active {
            background: #63946e;
            border-color: #63946e;
            color: #fff;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.08);
        }

        /* 結果カード */
        .result-section {
            background:
                radial-gradient(circle at 20% 30%, rgba(120, 120, 255, 0.08) 1px, transparent 1px),
                radial-gradient(circle at 70% 60%, rgba(120, 120, 255, 0.06) 1px, transparent 1px),
                rgba(227, 234, 241, 0.9);
            /* .msg.bot とトーンを揃える */
            background-size: 200px 200px;
            border-radius: 16px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.18);
            /* 影を少し弱める */
            padding: 14px 16px;
        }

        .result-section h3 {
            letter-spacing: 0.08em;
            color: #222;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .result-section p {
            font-size: 14px;
            line-height: 1.8;
            color: #222;
        }

        /* ローディング */
        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #9f7bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        .flatpickr-calendar {
            background: #ffffff;
            border-radius: 16px;
            border: none;
            border: 1px solid #ddd;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
            color: #222;
        }

        .flatpickr-day.selected {
            background: #3b6892;
            color: white;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        #starfield {
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }

        /* ロゴオーバーレイ */
        .logo-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #FFF;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.2s ease;
        }

        .logo-image {
            max-width: 70%;
            height: auto;
        }

        /* フェードイン用 */
        .fade-in {
            opacity: 1 !important;
        }

        .fortune-girl {
            opacity: 0;
            transition: opacity 1.2s ease;
            position: absolute;
            inset: 0;
            background-image: url("/res/img/background.png");
            background-repeat: no-repeat;
            background-position: center bottom;
            background-size: cover;
            pointer-events: none;
            z-index: 1;
        }

        .progress-bar {
            padding: 10px;
            font-size: 12px;
            text-align: center;
            background: #f6f6f6;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>

<body>
    <div class="container">
        <div id="progressBar" class="progress-bar"></div>
        <div id="logoOverlay" class="logo-overlay">
            <img src="/res/img/logo.png" alt="星の羅針盤 あとらす" class="logo-image">
        </div>
        <canvas id="starfield"></canvas>
        <div class="fortune-girl"></div>
        <div class="chat-box" id="chatBox"></div>
        <div class="input-area" id="inputArea"></div>
    </div>
    <script>
        const API_BASE = '/api';
        let userState = 'mode_select';
        let formData = {};
        let selectedMode = null;
        let messageQueue = Promise.resolve();
        let divinationResult = null;        // 既存
        let productCandidates = [];         // 追加: 商品候補
        let selectedProductIndex = null;    // 追加: 選択されたインデックス

        function setProgress(step, total, label) {
            const el = document.getElementById("progressBar");
            el.innerHTML = `
    STEP ${step} / ${total}<br>
    ${label}
  `;
        }
        function getGreetingMessage() {
            const hour = new Date().getHours();
            const nameForDisplay = getUserNameForDisplay();
            if (hour >= 5 && hour < 11) {
                return `おはようございます。星の羅針盤「あとらす」です。\n今の気分や、ちょっと気になっていることがあれば、ここで整理してみませんか？\n\nあなたのお話と星の流れをもとに、今のあなたに合いそうな石や過ごし方のヒントをお伝えします。`;
            } else if (hour >= 11 && hour < 17) {
                return `こんにちは。星の羅針盤「あとらす」です。\n仕事や人間関係、これからのことなど、頭の中が少しごちゃごちゃしているときは、一度言葉にしてみるのがおすすめです。\n\nいま気になっていることを教えていただければ、星の配置とあわせて、落ち着いて考えるためのヒントをお出しします。`;
            } else {
                return `こんばんは。星の羅針盤「あとらす」です。\n一日の終わりに、心の中を少しだけ振り返ってみませんか。\n\nうまく言葉にならなくても大丈夫なので、気になっていることやモヤモヤしていることを、ここにそのまま書いてみてください。`;
            }
        }
        function addMsg(text, isUser = false) {
            messageQueue = messageQueue.then(() => renderMessage(text, isUser));
            return messageQueue;
        }
        function renderMessage(text, isUser = false) {
            return new Promise((resolve) => {
                const box = document.getElementById('chatBox');
                const div = document.createElement('div');
                div.className = `msg ${isUser ? 'user' : 'bot'}`;
                box.appendChild(div);
                const formatted = formatText(text.replace(/\n/g, "<br>"));
                // ユーザーは即表示
                if (isUser) {
                    div.innerHTML = formatted;
                    scrollChatToBottom();
                    resolve();
                    return;
                }
                // botはタイプ表示
                typeText(div, formatted, 40).then(() => {
                    scrollChatToBottom();
                    resolve();
                });
            });
        }
        function formatText(text) {
            if (!text) return '';
            // 1段階だけ HTML エスケープを戻す
            const decoded = text
                .replace(/&lt;/g, '<')
                .replace(/&gt;/g, '>')
                .replace(/&amp;/g, '&');
            // もしまだ ** ... ** が使われているケースも残したいなら、ここで変換
            return decoded.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        }
        function setInputArea(html) {
            document.getElementById('inputArea').innerHTML = html;
            scrollChatToBottom();
        }
        function clearInputArea() {
            setInputArea('');
        }
        function stepModeSelect() {
            userState = 'mode_select';
            addMsg('今日はどちらにしますか？', false);
            setInputArea(`
    <button class="btn" onclick="selectMode('divination')">
      ✨ 導きの石を診断する
    </button>
    <button class="btn" onclick="selectMode('today_fortune')">
      🔮 今日の運勢を診断する
    </button>
    <button class="btn btn-secondary" onclick="selectMode('stone_select')">
      💎 好みでブレスレットを選ぶ
    </button>
  `);
        }
        function selectMode(mode) {
            selectedMode = mode;
            if (mode === 'today_fortune') {
                addMsg('今日の運勢を診断する', true);
                stepTodayFortune();          // 今日の運勢 → テーマへ流す関数
            } else if (mode === 'divination') {
                addMsg('導きの石を診断する', true);
                stepDivinationIntro();       // 既存
            } else {
                addMsg('好みでブレスレットを選ぶ', true);
                stepStoneSelectMethod();     // 既存
            }
        }
        async function stepTodayFortune() {
            const birth = formData.birth || {};
            selectedMode = 'today_fortune';
            await addMsg(
                '今日の運勢を読むために、生年月日・生まれた時間と場所を教えていただけますか？',
                false
            );
            showAstrologicalInfoForm();
        }
        function submitTodayComment() {
            const textarea = document.getElementById('todayComment');
            const comment = (textarea && textarea.value.trim()) || '';
            if (comment) {
                // ユーザー発話として表示
                addMsg(comment, true);
                // プロフィールに保存しておく（問題文などと合わせて後でAPIに渡せる）
                formData.today_comment = comment;
            }
            clearInputArea();
            // いつものテーマ選択へ
            addMsg(
                'ありがとうございます。\nでは、この流れを踏まえて、今日はどんなテーマについて詳しく見ていきましょうか？',
                false
            );
            stepConcerns();
        }
        async function stepDivinationIntro() {
            showAstrologicalInfoForm();
        }
        function stepAstrologicalInfo() {
            addMsg('進める', true);
            const hasSavedInfo = formData.gender && formData.birth && formData.birth.date;
            if (hasSavedInfo) {
                askAstrologicalInfoConfirm();
            } else {
                showAstrologicalInfoForm();
            }
        }
        function askAstrologicalInfoConfirm() {
            const birth = formData.birth || {};
            const summary = [
                `性別：${formData.gender || '未設定'}`,
                `生年月日：${birth.date || '未設定'}`,
                `出生時間：${birth.time || '未設定'}`,
                `出生地：${birth.place || '未設定'}`
            ].join('\n');
            const text = [
                '診断に使うあなたのプロフィールです。',
                '',
                summary,
                '',
                'この情報を使いますか？ それとも修正しますか？'
            ].join('\n');
            addMsg(text, false);
            setInputArea(`
        <button class="btn" onclick="continueWithSavedInfo()">この情報を使う</button>
        <button class="btn btn-secondary" onclick="modifyAstrologicalInfo()">修正する</button>
    `);
        }
        function continueWithSavedInfo() {
            addMsg('わかりました。この情報で進めます。', true);
            stepConcerns();
        }
        function modifyAstrologicalInfo() {
            addMsg('修正します', true);
            showAstrologicalInfoForm();
        }
        function showAstrologicalInfoForm() {
            setProgress(1, 4, "プロフィール入力");
            addMsg('今のあなたについて少しだけ教えてください。\nはじめに、診断に必要な情報をお聞かせください。', false);
            const gender = formData.gender || '';
            const birth = formData.birth || {};
            const savedDate = birth.date || '';
            const savedTime = birth.time || '';
            const savedPlace = birth.place || '';
            // ★ 追加：名前の既存値（なければ空文字）
            const savedName = formData.name || '';
            userState = 'astrological_info';
            setInputArea(`
        <div class="input-field">
            <label>お名前（ニックネーム）</label>
            <input type="text" id="userName" value="${savedName}" placeholder="例：さと">
        </div>
        <div class="input-field">
            <label>性別 *</label>
            <div class="btn-group">
                <button class="btn-toggle ${gender === '女性' ? 'active' : ''}" onclick="selectGender('女性', this)">女性</button>
                <button class="btn-toggle ${gender === '男性' ? 'active' : ''}" onclick="selectGender('男性', this)">男性</button>
                <button class="btn-toggle ${gender === 'その他' ? 'active' : ''}" onclick="selectGender('その他', this)">その他</button>
            </div>
        </div>
        <div class="input-field">
            <label>生年月日 *</label>
            <input type="text" id="birthDate" value="${savedDate}" required>
        </div>
        <div class="input-field">
            <label>出生時間</label>
            <input type="text" id="birthTime" value="${savedTime}">
        </div>
        <div class="input-field">
            <label>出生地</label>
            <input type="text" id="birthPlace" placeholder="例：札幌市" value="${savedPlace}">
        </div>
        <button class="btn" onclick="nextStep()">次へ</button>
    `);
            flatpickr("#birthDate", {
                locale: "ja",
                dateFormat: "Y-m-d",
                maxDate: "today"
            });
            flatpickr("#birthTime", {
                enableTime: true,
                noCalendar: true,
                dateFormat: "H:i",
                time_24hr: true
            });
        }
        function onAstrologicalInfoNext() {
            const date = document.getElementById('birthDate').value;
            const time = document.getElementById('birthTime').value;
            const place = document.getElementById('birthPlace').value;
            if (!date) {
                addMsg('生年月日は必ず入力してください。', false);
                return;
            }
            formData.birth = { date, time, place };
            addMsg('わかりました。この情報で星を見ていきますね。', true);
            // もし「今日の運勢」から来ていたなら、そこに戻す
            if (selectedMode === 'today_fortune') {
                stepTodayFortune();
            } else {
                // 通常フローの場合は、元の流れへ
                stepConcerns(); // あるいは stepDivinationIntro() など
            }
        }
        function selectGender(gender, el) {
            formData.gender = gender;
            el.parentElement
                .querySelectorAll('.btn-toggle')
                .forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }
        function stepStoneSelectMethod() {
            addMsg('どの方法で石を選びますか？', false);
            setInputArea(`
                <div class="btn-group">
                    <button class="btn-toggle active" onclick="selectStoneMethod('color', this)">色</button>
                    <button class="btn-toggle" onclick="selectStoneMethod('effect', this)">効果</button>
                    <button class="btn-toggle" onclick="selectStoneMethod('zodiac', this)">星座</button>
                    <button class="btn-toggle" onclick="selectStoneMethod('moon', this)">月</button>
                </div>
                <button class="btn" onclick="showStoneOptions()">次へ</button>
            `);
        }
        function selectStoneMethod(method, el) {
            formData.stone_method = method;
            el.parentElement.querySelectorAll('.btn-toggle').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }
        function showStoneOptions() {
            const method = formData.stone_method || 'color';
            const methodLabelMap = {
                color: '色',
                effect: '効果',
                zodiac: '星座',
                moon: '誕生月'
            };
            const methodLabel = methodLabelMap[method] || '';
            addMsg(methodLabel, true);
            let options = [];
            if (method === 'color') {
                options = ['紫', 'ピンク', '黄', '透明', '黒', '水色', '紺', '茶金', '白', '赤'];
            } else if (method === 'effect') {
                options = ['愛情', '癒し', '金運', '浄化', '保護', '直感', '情熱', '女性性'];
            } else if (method === 'zodiac') {
                options = ['牡羊座', '牡牛座', '双子座', '蟹座', '獅子座', '乙女座', '天秤座', '蠍座', '射手座', '山羊座', '水瓶座', '魚座'];
            } else {
                options = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
            }
            addMsg(`${methodLabel}を選んでください`, false);
            let html = '<div class="btn-group">';
            options.forEach(opt => {
                html += `<button class="btn-toggle" onclick="selectStoneOption('${opt}', this)">${opt}</button>`;
            });
            html += '</div><button class="btn" onclick="confirmStoneSelection()">この石で進む</button>';
            setInputArea(html);
        }
        function selectStoneOption(option, el) {
            formData.stone_option = option;
            el.parentElement.querySelectorAll('.btn-toggle').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }
        function confirmStoneSelection() {
            const option = formData.stone_option;
            if (!option) {
                addMsg('選択してください', false);
                return;
            }
            addMsg(option, true);
            const stoneMap = {
                '紫': 'アメジスト', 'ピンク': 'ローズクォーツ', '黄': 'シトリン', '透明': '水晶',
                '黒': 'オニキス', '水色': 'アクアマリン', '紺': 'ラピスラズリ', '茶金': 'タイガーアイ',
                '白': 'ムーンストーン', '赤': 'カーネリアン'
            };
            const selectedStone = stoneMap[option] || 'アメジスト';
            divinationResult = {
                stones_for_user: [
                    { name: selectedStone, reason: `${option}を選んだあなたにぴったりの石です` }
                ]
            };
            stepOrderChoice();
        }
        function stepConcerns() {
            setProgress(2, 4, "悩みの診断");
            const nameForDisplay = getUserNameForDisplay();
            const text = [
                `${nameForDisplay}がいま、特に気になっているテーマを教えてください。`,
                '複数選んでも大丈夫です。'
            ].join('\n\n');
            addMsg(text, false);
            userState = 'concerns';
            setInputArea(`
        <div class="btn-group">
            <button class="btn-toggle" onclick="toggleConcern(this, '恋愛')">💕 恋愛</button>
            <button class="btn-toggle" onclick="toggleConcern(this, '仕事')">💼 仕事</button>
            <button class="btn-toggle" onclick="toggleConcern(this, '金運')">💰 金運</button>
            <button class="btn-toggle" onclick="toggleConcern(this, '健康')">🌿 健康</button>
            <button class="btn-toggle" onclick="toggleConcern(this, '人間関係')">🤝 人間関係</button>
            <button class="btn-toggle" onclick="toggleConcern(this, 'その他')">✨ その他</button>
        </div>
        <button class="btn" onclick="nextStep()">次へ</button>
    `);
        }
        function toggleConcern(el, concern) {
            formData.concerns = formData.concerns || [];
            if (el.classList.contains('active')) {
                el.classList.remove('active');
                formData.concerns = formData.concerns.filter(c => c !== concern);
            } else {

        <button class="btn" onclick="goToProduct()">
        🛒 このブレスレットを購入する
        </button>
        <button class="btn btn-secondary" onclick="restartFromBeginning()">
          🔄 もう一度占う
        </button>
    `);
        }
        function goToProduct() {
            const slug =
                divinationResult.product_slug ||
                divinationResult.bracelet?.product_slug;
            if (!slug) {
                addMsg("商品ページが見つかりませんでした", false);
                return;
            }
            const diagnosisId = window.diagnosisId;
            const url = `https://spicastar.info/atlas/?p=` + divinationResult.id;
            window.location.href = url;
        }
        function confirmOrder() {
            const diagnosisId = window.diagnosisId;
            const wrist = formData.wrist_inner_cm;
            const problem = formData.problem || '';
            const oracleCard = divinationResult?.oraclecardname || '';
            const name = getUserNameForDisplay();
            const lines = [
                'この内容でブレスレットを注文したいです。',
                diagnosisId ? `診断ID: ${diagnosisId}` : '',
                wrist ? `手首内径: ${wrist}cm` : '',
                problem ? `お悩み: ${problem}` : '',
                oracleCard ? `オラクルカード: ${oracleCard}` : ''
            ].filter(Boolean);
            const text = lines.join('\n');
            const encoded = encodeURIComponent(text);
            // ここはあとらすの公式アカウントIDに差し替え
            window.location.href = `https://line.me/R/oaMessage/@586spjck/?${encoded}`;
        }
        function restartFromBeginning() {
            const box = document.getElementById('chatBox');
            box.innerHTML = '';
            addMsg(getGreetingMessage(), false);
            const saved = localStorage.getItem('hoshin-profile');
            if (saved) {
                formData = JSON.parse(saved);
                console.log('Parsed formData:', formData);
            } else {
                formData = {};
            }
            stepModeSelect();
        }
        function reuseProfile() {
            console.log('Reusing profile with formData:', formData);
            stepModeSelect();
        }
        function resetProfile() {
            formData = {};
            const box = document.getElementById('chatBox');
            box.innerHTML = '';
            addMsg(getGreetingMessage(), false);
            stepModeSelect();
        }
        function saveProfileToLocalStorage() {
            const profile = {
                name: formData.name,                     // ★ 追加
                gender: formData.gender,
                birth: formData.birth,
                wrist_inner_cm: formData.wrist_inner_cm,
                bead_size_mm: formData.bead_size_mm,
                bracelet_type: formData.bracelet_type,
            };
            localStorage.setItem('hoshin-profile', JSON.stringify(profile));
            if (userId) {
                fetch('/api/profile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, ...profile }),
                }).catch(() => { });
            }
        }
        function getUserNameForDisplay() {
            return (formData.name && formData.name.trim())
                ? `${formData.name.trim()}さん`
                : 'あなた';
        }
        function nextStep() {
            if (userState === 'astrological_info') {
                const name = document.getElementById('userName')?.value || '';
                const date = document.getElementById('birthDate')?.value;
                const time = document.getElementById('birthTime')?.value || '';
                const place = document.getElementById('birthPlace')?.value || '';
                if (!formData.gender) {
                    addMsg('性別を選んでください', false);
                    return;
                }
                if (!date) {
                    addMsg('生年月日は必須です', false);
                    return;
                }
                formData.birth = { date, time, place };
                formData.name = name;
                console.log('Saved astrological info:', formData.birth);
                saveProfileToLocalStorage();
                clearInputArea();
                // ★ ここでモードを見て分岐
                if (selectedMode === 'today_fortune') {
                    runTodayFortune();   // 今日の運勢を実行する関数へ
                } else {
                    stepConcerns();      // これまで通り通常の占いフローへ
                }
                return;
                // それ以外の userState の処理は既存のまま
            } else if (userState === 'concerns') {
                stepProblem();
            }
        }
        async function runTodayFortune() {
            const birth = formData.birth || {};
            await addMsg(
                '生まれた時間と場所も含めて、AIに今日の運勢を聞いてみますね。',
                false
            );
            // 診断中の画面を表示
            setInputArea(`
    <div class="loading">
      <div class="spinner"></div>
      <p>今日の運勢を読み解いています... 🔮</p>
    </div>
  `);
            try {
                const res = await fetch('/api/today-fortune', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        gender: formData.gender,
                        birth: birth
                    })
                });
                if (!res.ok) {
                    throw new Error(`HTTP error ${res.status}`);
                }
                const json = await res.json();
                // 1) API呼び出しレベルの失敗（HTTPステータス）
                if (!res.ok) {
                    clearInputArea();
                    await addMsg(
                        `占いAPIでエラーが発生しました（${res.status}）`,
                        false
                    );
                    setInputArea(`
    <button class="btn btn-secondary" onclick="restartFromBeginning()">
      🔄 最初に戻る
    </button>
  `);
                    return;
                }
                // 2) サーバー側が error を返してきた場合
                if (json.error) {
                    clearInputArea();
                    await addMsg(
                        `占いの処理中にエラーが発生しました:\n${json.error}`,
                        false
                    );
                    setInputArea(`
    <button class="btn btn-secondary" onclick="restartFromBeginning()">
      🔄 最初に戻る
    </button>
  `);
                    return;
                }
                // 3) 正常系：メッセージ抽出
                const rawMessage =
                    json.message ||
                    '今日は、自分のペースを大切に過ごすと良さそうな日です。';
                const fortuneText = extractFortuneFromMessage(rawMessage);
                // 診断完了 → 入力エリアクリア
                clearInputArea();
                await addMsg(`【今日の運勢】\n${fortuneText}`, false);
                await addMsg(
                    'この流れを踏まえて、あなたの導きの天然石を診断してみますか？',
                    false
                );
                setInputArea(`
  <button class="btn" onclick="selectMode('divination')">
    💎 導きの天然石を診断する
  </button>
  <button class="btn btn-secondary" onclick="restartFromBeginning()">
    🔄 最初に戻る
  </button>
`);
            } catch (e) {
                clearInputArea();
                await addMsg(
                    'AIにうまくアクセスできませんでした。\n少し時間をおいてからもう一度お試しください。',
                    false
                );
                setInputArea(`
      <button class="btn" onclick="restartFromBeginning()">🔄 最初に戻る</button>
    `);
            }
        }
        function extractFortuneFromMessage(raw) {
            if (!raw) return '';
            // ```json ～ ``` を取り除く
            const cleaned = raw
                .replace(/```json/g, '')
                .replace(/```/g, '')
                .trim();
            try {
                const obj = JSON.parse(cleaned);
                // { "鑑定結果": "..." } 想定
                return obj.鑑定結果 || cleaned;
            } catch (e) {
                // JSONじゃなければそのまま返す
                return cleaned;
            }
        }
        function scrollChatToBottom() {
            const box = document.getElementById('chatBox');
            if (!box) return;
            box.scrollTop = box.scrollHeight;
        }
        function typeText(element, text, speed = 40) {
            return new Promise((resolve) => {
                const plain = text
                    .replace(/<br\s*\/?>/gi, "\n")
                    .replace(/<[^>]*>/g, "");
                let i = 0;
                function type() {
                    if (i < plain.length) {
                        element.textContent = plain.slice(0, i + 1);
                        i++;
                        scrollChatToBottom();
                        setTimeout(type, speed);
                    } else {
                        element.innerHTML = text;
                        resolve();
                    }
                }
                type();
            });
        }
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) {
                return parts.pop().split(';').shift();
            }
            return null;
        }
        function setCookie(name, value, days = 365) {
            const d = new Date();
            d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
            const expires = "expires=" + d.toUTCString();
            document.cookie = `${name}=${value};${expires};path=/`;
        }
        function generateUserId() {
            // 簡易 UUID でOK（将来差し替え前提）
            const s4 = () =>
                Math.floor((1 + Math.random()) * 0x10000)
                    .toString(16)
                    .substring(1);
            return (
                s4() +
                s4() +
                "-" +
                s4() +
                "-" +
                s4() +
                "-" +
                s4() +
                "-" +
                s4() +
                s4() +
                s4()
            );
        }
        let userId = null;
        // ★ ページ読み込み時は「アニメだけ」やる
        window.onload = async function () {
            try {
                await initLiff();
                fillOrderNote();
            } catch (e) {
                console.log("LIFF init error", e);
            }
            const logoOverlay = document.getElementById('logoOverlay');
            const fortuneGirl = document.querySelector('.fortune-girl');
            // 1. ロゴをフェードイン
            setTimeout(() => {
                if (!logoOverlay) return;
                logoOverlay.style.pointerEvents = 'auto';
                logoOverlay.classList.add('fade-in');
            }, 300);
            const logoDisplayTime = 1800; // ロゴが見えている時間
            const fadeDuration = 1200;   // CSS と合わせる
            // 2. ロゴ表示キープ → フェードアウト → 背景フェードイン → 会話開始
            setTimeout(() => {
                if (!logoOverlay) {
                    initChatFlow(); // 安全策
                    return;
                }
                // ロゴをフェードアウト
                logoOverlay.classList.remove('fade-in');
                // ロゴが薄れてきたら背景フェードイン
                setTimeout(() => {
                    if (fortuneGirl) {
                        fortuneGirl.classList.add('fade-in');
                    }
                    // 背景フェードイン完了後にロゴオーバーレイを無効化して会話スタート
                    setTimeout(() => {
                        logoOverlay.style.display = 'none';
                        logoOverlay.style.pointerEvents = 'none';
                        initChatFlow(); // ★ここで会話開始
                    }, fadeDuration);
                }, fadeDuration / 2);
            }, 300 + logoDisplayTime);
        };
        async function initChatFlow() {
            // 1) userId を cookie から読み込み or 新規発行
            userId = getCookie('hoshin_user_id');
            if (userId) {
                try {
                    const res = await fetch(`/api/profile?user_id=${encodeURIComponent(userId)}`);
                    if (res.ok) {
                        const profile = await res.json();
                        formData = { ...formData, ...profile };
                    }
                } catch (e) {
                    console.log('profile load error', e);
                }
            }
            const box = document.getElementById('chatBox');
            box.innerHTML = '';
            const greeting = getGreetingMessage().split("\n\n");
            for (const line of greeting) {
                await addMsg(line, false);
            }
            // 3) ローカルのlocalStorageもあればマージ（任意）
            const saved = localStorage.getItem('hoshin-profile');
            if (saved) {
                const localProfile = JSON.parse(saved);
                formData = { ...localProfile, ...formData };
            }
            stepModeSelect();
        }
    </script>
    <script>
        const canvas = document.getElementById("starfield");
        const ctx = canvas.getContext("2d");
        let stars = [];
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resize);
        resize();
        function createStars() {
            stars = [];
            for (let i = 0; i < 120; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.5,
                    speed: Math.random() * 0.3 + 0.1
                });
            }
        }
        createStars();
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
                ctx.fill();
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
    <script>
        async function initLiff() {
            try {
                await liff.init({
                    liffId: "2009078638-GZhFVgaz"
                });
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    window.LINE_USER_ID = profile.userId;
                }
            } catch (e) {
                console.log("LIFF not available");
            }
        }
        function fillOrderNote() {
            const params = new URLSearchParams(window.location.search)
            const diagnosisId = params.get("d")
            if (!diagnosisId) return
            const noteField = document.querySelector("#order_comments")
            if (noteField) {
                noteField.value = "diagnosis_id:" + diagnosisId
            }
        }
    </script>
